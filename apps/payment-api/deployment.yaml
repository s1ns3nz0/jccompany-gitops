apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: payment-api
  labels:
    app: payment-api
    app.kubernetes.io/name: payment-api
  annotations:
spec:
  replicas: 2    # 가용성: 2개 Pod
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      serviceAccountName: payment-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:           # PSS restricted 충족
          type: RuntimeDefault
      containers:
        - name: payment-api
          # SP 800-204D §5.1.1: image digest pinning (파이프라인이 자동 업데이트)
          image: 106760547719.dkr.ecr.ap-northeast-2.amazonaws.com/jccompany/payment-api@sha256:eb6036432dfa69edc7e8149b9fd3002a96682f8b7043aed2538f497bf84a831e
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          # 헬스체크 — Spring Boot Actuator
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JAVA_OPTS
              value: "-javaagent:/app/opentelemetry-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            - name: OTEL_SERVICE_NAME
              value: "payment-api"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - "--config=/etc/otel/otel-collector-config.yaml"
          ports:
            - containerPort: 4317
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
            - name: otel-tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: otel-tmp
          emptyDir: {}
        - name: otel-config
          configMap:
            name: otel-collector-config
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: payment-api

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: payment-api
  labels:
    app: payment-api
    app.kubernetes.io/name: payment-api
    app.kubernetes.io/version: "COMMIT_SHA"   # Actions가 업데이트
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    deployment.kubernetes.io/revision: "1"
    # 공급망 추적용 메타데이터
    build.commit: "COMMIT_SHA"
    build.run-id: "GITHUB_RUN_ID"
    build.actor: "GITHUB_ACTOR"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
        version: "COMMIT_SHA"
    spec:
      serviceAccountName: payment-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: payment-api
          # H1: image tag 대신 digest 사용 (SP 800-204D §5.1.1)
          image: 106760547719.dkr.ecr.ap-northeast-2.amazonaws.com/jccompany/payment-api@sha256:c3eaf1e0987ec3221d208b92514e6b5663cffae1251d609f3064a89ad800fe47
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: JAVA_OPTS
              value: "-javaagent:/app/opentelemetry-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            - name: OTEL_SERVICE_NAME
              value: "payment-api"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - "--config=/etc/otel/config.yaml"
          ports:
            - containerPort: 4317
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
      volumes:
        - name: tmp
          emptyDir: {}
        - name: otel-config
          configMap:
            name: otel-collector-config
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: payment-api
